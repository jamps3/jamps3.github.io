<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | escape }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/blog.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/blog.html' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/portfolio.html' | relative_url }}">Portfolio</a>
      <a href="{{ '/blog.html' | relative_url }}">Blog</a>
      <a href="{{ '/archive.html' | relative_url }}">Archive</a>
      <a href="{{ '/tags.html' | relative_url }}">Tags</a>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} Jan-Erik Labbas.</p>
  </footer>

  <script src="{{ '/assets/js/blog.js' | relative_url }}" defer></script>
</body>
</html>
